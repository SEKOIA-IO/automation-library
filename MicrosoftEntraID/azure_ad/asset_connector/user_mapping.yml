mapping:
  ocsf_class: "user_inventory_info"
  class_uid: 5003
  version: "1.6.0"

  samples:
    - name: "Entra ID Active User"
      description: "Microsoft Entra ID user with console access and group membership"
      data: |
        {
          "id": "a1b2c3d4-e5f6-7890-abcd-ef1234567890",
          "userPrincipalName": "mary.jones@example.com",
          "displayName": "Mary Jones",
          "mail": "mary.jones@example.com",
          "jobTitle": "Financial Analyst",
          "department": "Finance",
          "officeLocation": "New York, NY",
          "companyName": "Example Corp",
          "createdDateTime": "2020-06-04T10:00:00Z",
          "signInActivity": {
            "lastSignInDateTime": "2025-08-26T09:30:00Z"
          },
          "accountEnabled": true,
          "employeeId": "EMP456",
          "employeeType": "Employee",
          "onPremisesSamAccountName": "mary.jones",
          "lastPasswordChangeDateTime": "2025-01-15T08:00:00Z",
          "memberOf": [
            { "id": "g1", "displayName": "Finance Users" },
            { "id": "g2", "displayName": "All Users" }
          ]
        }

    - name: "Entra ID Disabled User"
      description: "Microsoft Entra ID user with account disabled"
      data: |
        {
          "id": "b2c3d4e5-f6a7-8901-bcde-f12345678901",
          "userPrincipalName": "robert.smith@example.com",
          "displayName": "Robert Smith",
          "mail": "robert.smith@example.com",
          "jobTitle": "Senior Software Engineer",
          "department": "Engineering",
          "officeLocation": "San Francisco, CA",
          "companyName": "Example Corp",
          "createdDateTime": "2020-06-04T10:00:00Z",
          "signInActivity": {
            "lastSignInDateTime": "2025-06-10T14:00:00Z"
          },
          "accountEnabled": false,
          "employeeId": "EMP789",
          "onPremisesSamAccountName": "robert.smith",
          "lastPasswordChangeDateTime": "2024-11-01T12:00:00Z",
          "memberOf": [
            { "id": "g3", "displayName": "Engineering Users" }
          ]
        }

  fields:
    # USER IDENTIFICATION
    - source: "id"
      target: "user.uid"
      type: "string"
      logic: "Direct mapping of Microsoft Entra ID user UUID"
      description: "Microsoft Entra ID user unique identifier (UUID)"

    - source: "userPrincipalName"
      target: "user.name"
      type: "string"
      logic: "Direct mapping of user principal name"
      description: "User principal name (UPN) - email-like format"

    - source: "displayName"
      target: "user.full_name"
      type: "string"
      logic: "Direct mapping of display name"
      description: "User display name (\"Unknown\" if absent)"

    - source: "displayName"
      target: "user.display_name"
      type: "string"
      logic: "Direct mapping of display name"
      description: "User display name"

    - source: "userPrincipalName | split('@') | last"
      target: "user.domain"
      type: "string"
      logic: "Extract domain from UPN (part after @)"
      description: "User domain derived from UPN"

    - source: "onPremisesSamAccountName"
      target: "user.uid_alt"
      type: "string"
      logic: "Direct mapping of on-premises SAM account name"
      description: "Alternate user identifier (on-premises SAM account name)"

    # MFA STATUS (fetched via /users/{id}/authentication/methods)
    - source: "api: authentication/methods"
      target: "user.has_mfa"
      type: "boolean"
      logic: "true if any MicrosoftAuthenticator, SoftwareOath, or Phone method is registered"
      description: "Whether the user has MFA configured"

    # USER TYPE (computed from directory role membership)
    - source: "api: transitiveMemberOf/microsoft.graph.directoryRole"
      target: "user.type_id"
      type: "integer"
      logic: "2 (Admin) if user has directory roles, otherwise 1 (User)"
      description: "OCSF user type ID"

    - source: "api: transitiveMemberOf/microsoft.graph.directoryRole"
      target: "user.type"
      type: "string"
      logic: "\"Admin\" if user has directory roles, otherwise \"User\""
      description: "OCSF user type string"

    # ACCOUNT INFORMATION
    - source: "id"
      target: "user.account.uid"
      type: "string"
      logic: "Direct mapping of Entra ID object UUID"
      description: "Entra ID account unique identifier (UUID)"

    - source: "userPrincipalName"
      target: "user.account.name"
      type: "string"
      logic: "Direct mapping of user principal name"
      description: "Account username (UPN)"

    - source: "static: Azure AD Account"
      target: "user.account.type"
      type: "string"
      logic: "Always 'Azure AD Account' (AccountTypeStr.AZURE_AD_ACCOUNT)"
      description: "OCSF account type string"

    - source: "static: 6"
      target: "user.account.type_id"
      type: "integer"
      logic: "Always 6 for Azure AD Account (AccountTypeId.AZURE_AD_ACCOUNT)"
      description: "OCSF account type ID"

    # CONTACT INFORMATION
    - source: "mail"
      target: "user.email_addr"
      type: "string"
      logic: "Direct mapping of email address (\"Unknown\" if absent)"
      description: "User email address"

    # GROUPS (fetched via /users/{id}/memberOf)
    - source: "api: memberOf"
      target: "user.groups"
      type: "array[object]"
      logic: "Create Group objects with group displayName as name and id as uid"
      description: "Group memberships (paginated)"

    # ORGANIZATIONAL INFORMATION
    - source: "companyName"
      target: "user.org.name"
      type: "string"
      logic: "Present only when companyName is non-null"
      description: "User's company/organization name"

    - source: "officeLocation"
      target: "user.org.ou_name"
      type: "string"
      logic: "Mapped as organizational unit name within the org object"
      description: "Office location (organizational unit)"

    # TEMPORAL INFORMATION
    - source: "createdDateTime"
      target: "time"
      type: "float"
      logic: "Convert ISO 8601 to Unix epoch for OCSF event timestamp (0 if absent)"
      description: "OCSF event timestamp (user creation time as Unix epoch)"

    # OCSF EVENT CLASSIFICATION
    - source: "static: 2"
      target: "activity_id"
      type: "integer"
      logic: "Always 2 for 'Collect' activity"
      description: "OCSF activity ID for inventory collection"

    - source: "static: Collect"
      target: "activity_name"
      type: "string"
      logic: "Always 'Collect'"
      description: "OCSF activity name"

    - source: "static: Discovery"
      target: "category_name"
      type: "string"
      logic: "Always 'Discovery'"
      description: "OCSF category name"

    - source: "static: 5"
      target: "category_uid"
      type: "integer"
      logic: "Always 5 for Discovery category"
      description: "OCSF category UID"

    - source: "static: User Inventory Info"
      target: "class_name"
      type: "string"
      logic: "Always 'User Inventory Info'"
      description: "OCSF class name"

    - source: "static: 5003"
      target: "class_uid"
      type: "integer"
      logic: "Always 5003 for User Inventory Info"
      description: "OCSF class UID"

    - source: "static: 500302"
      target: "type_uid"
      type: "integer"
      logic: "500300 + activity_id (2) = 500302"
      description: "OCSF type UID"

    - source: "static: User Inventory"
      target: "type_name"
      type: "string"
      logic: "Always 'User Inventory'"
      description: "OCSF type name"

    - source: "static: Informational"
      target: "severity"
      type: "string"
      logic: "Always 'Informational' for inventory events"
      description: "Event severity level"

    - source: "static: 1"
      target: "severity_id"
      type: "integer"
      logic: "Always 1 for Informational severity"
      description: "OCSF severity ID"

    # METADATA
    - source: "static: Microsoft Entra ID"
      target: "metadata.product.name"
      type: "string"
      logic: "Always 'Microsoft Entra ID'"
      description: "Source product name"

    - source: "static: 1.0"
      target: "metadata.product.version"
      type: "string"
      logic: "Always '1.0'"
      description: "Source product version"

    - source: "static: 1.6.0"
      target: "metadata.version"
      type: "string"
      logic: "Fixed OCSF schema version"
      description: "OCSF schema version"

    # OCSF ENRICHMENT [0] - ACCOUNT STATUS
    - source: "static: account"
      target: "enrichments[0].name"
      type: "string"
      logic: "Always 'account'"
      description: "Enrichment object name"

    - source: "static: status"
      target: "enrichments[0].value"
      type: "string"
      logic: "Always 'status'"
      description: "Enrichment object value"

    - source: "accountEnabled"
      target: "enrichments[0].data.is_enabled"
      type: "boolean"
      logic: "Direct mapping of account enabled status"
      description: "Whether the user account is enabled"

    - source: "signInActivity.lastSignInDateTime"
      target: "enrichments[0].data.last_logon"
      type: "string"
      logic: "ISO 8601 datetime of last sign-in; null if no sign-in recorded"
      description: "Last sign-in datetime (ISO 8601)"

    - source: "lastPasswordChangeDateTime"
      target: "enrichments[0].data.last_time_password_change"
      type: "float"
      logic: "Convert ISO 8601 to Unix timestamp; null if absent"
      description: "Last password change timestamp (Unix epoch)"

    # OCSF ENRICHMENT [1] - EMPLOYMENT INFO (conditional)
    - source: "static: employment"
      target: "enrichments[1].name"
      type: "string"
      logic: "Present only when at least one of department, jobTitle, employeeId, or employeeType is non-null"
      description: "Enrichment object name for employment info"

    - source: "computed: \"{department} - {jobTitle}\".strip(\" -\") or \"info\""
      target: "enrichments[1].value"
      type: "string"
      logic: "Concatenates department and jobTitle separated by ' - '; falls back to 'info'"
      description: "Human-readable employment summary"

  ocsf_samples:
    - name: "User Inventory Info: Collect"
      description: "Transformed Entra ID user to OCSF User Inventory Info event"
      data: |
        {
          "activity_id": 2,
          "activity_name": "Collect",
          "category_name": "Discovery",
          "category_uid": 5,
          "class_name": "User Inventory Info",
          "class_uid": 5003,
          "type_name": "User Inventory",
          "type_uid": 500302,
          "severity": "Informational",
          "severity_id": 1,
          "time": 1591254000.0,
          "metadata": {
            "product": {
              "name": "Microsoft Entra ID",
              "version": "1.0"
            },
            "version": "1.6.0"
          },
          "user": {
            "uid": "a1b2c3d4-e5f6-7890-abcd-ef1234567890",
            "name": "mary.jones@example.com",
            "full_name": "Mary Jones",
            "display_name": "Mary Jones",
            "email_addr": "mary.jones@example.com",
            "domain": "example.com",
            "uid_alt": "mary.jones",
            "has_mfa": true,
            "type_id": 1,
            "type": "User",
            "account": {
              "uid": "a1b2c3d4-e5f6-7890-abcd-ef1234567890",
              "name": "mary.jones@example.com",
              "type": "Azure AD Account",
              "type_id": 6
            },
            "groups": [
              {
                "uid": "g1",
                "name": "Finance Users"
              },
              {
                "uid": "g2",
                "name": "All Users"
              }
            ],
            "org": {
              "name": "Example Corp",
              "ou_name": "New York, NY"
            }
          },
          "enrichments": [
            {
              "name": "account",
              "value": "status",
              "data": {
                "is_enabled": true,
                "last_logon": "2025-08-26T09:30:00+00:00",
                "last_time_password_change": 1736928000.0
              }
            },
            {
              "name": "employment",
              "value": "Finance - Financial Analyst",
              "data": {}
            }
          ]
        }
