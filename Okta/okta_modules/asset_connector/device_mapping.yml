mapping:
  ocsf_class: "Device Inventory Info"
  class_uid: 5001
  version: "1.6.0"
  description: "Okta device information"
  source_name: "Okta"

  samples:
    - name: "Okta Managed Device"
      description: "Okta managed device with active compliance status"
      data: |
        {
          "id": "gooabc123defGHIJKL",
          "status": "ACTIVE",
          "created": "2023-06-04T10:00:00.000Z",
          "lastUpdated": "2025-08-26T09:30:00.000Z",
          "lastSeen": "2025-08-26T09:30:00.000Z",
          "profile": {
            "displayName": "LAPTOP-MARY-001",
            "platform": "Windows",
            "osVersion": "10.0.22621",
            "serialNumber": "ABC123DEF456",
            "imei": null,
            "manufacturer": "Dell",
            "model": "Latitude 5540",
            "udid": null,
            "registered": true,
            "secureHardwarePresent": true,
            "diskEncryptionType": "BitLocker",
            "sid": "S-1-5-21-3623811015-3361044348-30300820-1013"
          },
          "_links": {
            "self": [...]
          }
        }

    - name: "Okta iOS Device"
      description: "Okta managed iOS device"
      data: |
        {
          "id": "goodef456ghiJKLMNO",
          "status": "ACTIVE",
          "created": "2023-04-15T08:00:00.000Z",
          "lastUpdated": "2025-08-26T09:30:00.000Z",
          "lastSeen": "2025-08-26T09:30:00.000Z",
          "profile": {
            "displayName": "iPhone-ROBERT-001",
            "platform": "iOS",
            "osVersion": "17.5.1",
            "serialNumber": "A2R4P7B9C1D2E3F4G5",
            "imei": "356938035643809",
            "manufacturer": "Apple",
            "model": "iPhone 14 Pro",
            "udid": "00008120-0015E40A2E59801E",
            "registered": true,
            "secureHardwarePresent": true,
            "diskEncryptionType": "FileVault"
          },
          "_links": {
            "self": [...]
          }
        }

  fields:
    # DEVICE IDENTIFICATION
    - source: "id"
      target: "device.uid"
      type: "string"
      logic: "Direct mapping of Okta device ID"
      description: "Okta device unique identifier"

    - source: "profile.serialNumber"
      target: "device.uid_alt"
      type: "string"
      logic: "Serial number used as an alternative device identifier"
      description: "Device serial number (alternative UID)"

    - source: "profile.displayName"
      target: "device.name"
      type: "string"
      logic: "Direct mapping of display name"
      description: "Device display name"

    - source: "profile.displayName"
      target: "device.hostname"
      type: "string"
      logic: "Direct mapping of display name as hostname"
      description: "Device hostname (from display name)"

    # OPERATING SYSTEM INFORMATION
    - source: "profile.platform"
      target: "device.os.name"
      type: "string"
      logic: "Map platform to human-readable OS name (Windows, macOS, Linux, iOS, Android)"
      description: "Operating system name"

    - source: "profile.platform"
      target: "device.os.type"
      type: "string"
      logic: "Map platform to OSTypeStr enum value"
      description: "Operating system type"

    - source: "profile.platform"
      target: "device.os.type_id"
      type: "integer"
      logic: "Map platform to OSTypeId enum value"
      description: "Operating system type ID"

    # NOTE: profile.osVersion has no target in the OCSF OperatingSystem model
    # (the 'version' field was removed from the SDK). Retained in source data only.

    # DEVICE HARDWARE INFORMATION
    - source: "profile.manufacturer"
      target: "device.vendor_name"
      type: "string"
      logic: "Direct mapping of device manufacturer"
      description: "Device vendor/manufacturer name (Dell, Apple, Samsung, etc.)"

    - source: "profile.model"
      target: "device.model"
      type: "string"
      logic: "Direct mapping of device model"
      description: "Device model"

    - source: "profile.imei"
      target: "device.imei_list"
      type: "array[string]"
      logic: "Wrap single IMEI string in a list if not null"
      description: "International Mobile Equipment Identity list (mobile devices only)"

    - source: "profile.udid"
      target: "device.udid"
      type: "string"
      logic: "Direct mapping of UDID for Apple devices"
      description: "Unique Device Identifier (iOS/macOS)"

    # DEVICE TYPE
    - source: "profile.platform"
      target: "device.type"
      type: "string"
      logic: "Derive DeviceTypeStr from platform: windows/macos → Desktop, ios/android → Mobile, others → Other"
      description: "OCSF device type"

    - source: "profile.platform"
      target: "device.type_id"
      type: "integer"
      logic: "Derive DeviceTypeId from platform: windows/macos → 2, ios/android → 5, others → 99"
      description: "OCSF device type ID"

    # DEVICE MANAGEMENT & COMPLIANCE
    - source: "profile.registered"
      target: "device.is_managed"
      type: "boolean"
      logic: "Direct mapping: registered = managed by Okta"
      description: "Whether device is managed by Okta"

    - source: "computed: status == 'ACTIVE' and profile.registered"
      target: "device.is_compliant"
      type: "boolean"
      logic: "true only when status is ACTIVE and device is registered"
      description: "Whether device is compliant"

    # DEVICE SECURITY
    - source: "profile.secureHardwarePresent"
      target: "device.is_trusted"
      type: "boolean"
      logic: "Direct mapping of secure hardware presence (TPM / Secure Enclave)"
      description: "Whether device hardware is trusted"

    # TEMPORAL INFORMATION
    - source: "created"
      target: "device.created_time"
      type: "integer"
      logic: "Convert ISO 8601 to Unix epoch"
      description: "Device creation timestamp (Unix epoch)"

    - source: "created"
      target: "device.first_seen_time"
      type: "integer"
      logic: "Convert ISO 8601 to Unix epoch (same as created_time)"
      description: "First seen timestamp (Unix epoch)"

    - source: "lastSeen"
      target: "device.last_seen_time"
      type: "integer"
      logic: "Convert ISO 8601 to Unix epoch; falls back to lastUpdated if null"
      description: "Last seen timestamp (Unix epoch)"

    - source: "created"
      target: "time"
      type: "integer"
      logic: "Convert ISO 8601 to Unix epoch for OCSF event timestamp"
      description: "OCSF event timestamp (device discovery time)"

    # OCSF EVENT CLASSIFICATION
    - source: "static: 2"
      target: "activity_id"
      type: "integer"
      logic: "Always 2 for 'Collect' activity"
      description: "OCSF activity ID for inventory collection"

    - source: "static: Collect"
      target: "activity_name"
      type: "string"
      logic: "Always 'Collect'"
      description: "OCSF activity name"

    - source: "static: Discovery"
      target: "category_name"
      type: "string"
      logic: "Always 'Discovery'"
      description: "OCSF category name"

    - source: "static: 5"
      target: "category_uid"
      type: "integer"
      logic: "Always 5 for Discovery category"
      description: "OCSF category UID"

    - source: "static: Device Inventory Info"
      target: "class_name"
      type: "string"
      logic: "Always 'Device Inventory Info'"
      description: "OCSF class name"

    - source: "static: 5001"
      target: "class_uid"
      type: "integer"
      logic: "Always 5001 for Device Inventory Info"
      description: "OCSF class UID"

    - source: "computed: 500100 + activity_id"
      target: "type_uid"
      type: "integer"
      logic: "Base 500100 + activity_id (2 = 500102)"
      description: "OCSF type UID"

    - source: "computed: class_name + ': ' + activity_name"
      target: "type_name"
      type: "string"
      logic: "Concatenate 'Device Inventory Info: Collect'"
      description: "OCSF type name"

    - source: "static: Informational"
      target: "severity"
      type: "string"
      logic: "Always 'Informational' for inventory events"
      description: "Event severity level"

    - source: "static: 1"
      target: "severity_id"
      type: "integer"
      logic: "Always 1 for Informational severity"
      description: "OCSF severity ID"

    # METADATA
    - source: "static: Okta"
      target: "metadata.product.name"
      type: "string"
      logic: "Always 'Okta'"
      description: "Source product name"

    - source: "static: Okta"
      target: "metadata.product.vendor_name"
      type: "string"
      logic: "Always 'Okta'"
      description: "Source vendor name"

    - source: "static: N/A"
      target: "metadata.product.version"
      type: "string"
      logic: "Always 'N/A' (Okta API does not expose a product version)"
      description: "Source product version (placeholder)"

    - source: "static: 1.6.0"
      target: "metadata.version"
      type: "string"
      logic: "Fixed OCSF schema version"
      description: "OCSF schema version"

    # OCSF ENRICHMENT - DISK ENCRYPTION
    # DeviceDataObject fields: Firewall_status, Storage_encryption, Users, Full_qualified_domain_name
    - source: "profile.diskEncryptionType"
      target: "enrichments[0].data.Storage_encryption"
      type: "object"
      logic: |
        Normalise to uppercase, then map diskEncryptionType to EncryptionObject(partitions):
          ALL_INTERNAL_VOLUMES → {"all_internal": "Enabled"}
          USER                 → {"user": "Enabled"}
          FULL / BITLOCKER / FILEVAULT → {"full": "Enabled"}
          any other non-empty  → {"full": "Enabled"} (fallback)
          NONE or null         → skip enrichment
      description: "Disk encryption status mapped to OCSF EncryptionObject"

    # OCSF ENRICHMENT - HARDWARE IDENTIFIERS
    - source: "profile.sid"
      target: "enrichments[0].data.Users"
      type: "array[string]"
      logic: "Append 'windows_sid:<value>' to Users list if sid is present"
      description: "Windows Security Identifier stored as a key:value string"

    - source: "static: device_info"
      target: "enrichments[0].name"
      type: "string"
      logic: "Always 'device_info'"
      description: "Enrichment object name"

    - source: "static: hardware_and_security"
      target: "enrichments[0].value"
      type: "string"
      logic: "Always 'hardware_and_security'"
      description: "Enrichment object value"

