  fields:
    # USER IDENTIFICATION
    - source: "id"
      target: "user.uid"
      type: "string"
      logic: "Direct mapping of Okta user ID"
      description: "Okta user unique identifier"

    - source: "profile.login"
      target: "user.name"
      type: "string"
      logic: "Direct mapping of user login (email format)"
      description: "User login/username (typically email)"

    - source: "profile.firstName + ' ' + profile.lastName"
      target: "user.full_name"
      type: "string"
      logic: "Concatenate Okta SDK first_name and last_name profile fields; use 'None' as fallback"
      description: "User full name"

    - source: "profile.displayName"
      target: "user.display_name"
      type: "string"
      logic: "Map Okta SDK display_name profile field if present and is a string"
      description: "User display name"

    - source: "profile.login"
      target: "user.uid_alt"
      type: "string"
      logic: "Direct mapping of user login as alternate identifier"
      description: "Alternate user identifier (login)"

    # ACCOUNT INFORMATION
    - source: "id"
      target: "user.account.uid"
      type: "string"
      logic: "Direct mapping of Okta user ID as account unique identifier"
      description: "Okta account unique identifier"

    - source: "profile.login"
      target: "user.account.name"
      type: "string"
      logic: "Direct mapping of user login"
      description: "Account username (login)"

    - source: "static: Other"
      target: "user.account.type"
      type: "string"
      logic: "Always 'Other' (AccountTypeStr.OTHER); no Okta-specific type in OCSF SDK"
      description: "Account type identifier"

    - source: "static: 99"
      target: "user.account.type_id"
      type: "integer"
      logic: "Always 99 (AccountTypeId.OTHER); no Okta-specific type ID in OCSF SDK"
      description: "OCSF account type ID"

    # CONTACT INFORMATION
    - source: "profile.email"
      target: "user.email_addr"
      type: "string"
      logic: "Direct mapping of email address"
      description: "User email address"

    - source: "profile.email"
      target: "user.domain"
      type: "string"
      logic: "Extract domain from email address (part after '@')"
      description: "User email domain"

    # ORGANIZATIONAL INFORMATION
    - source: "profile.organization"
      target: "user.org.name"
      type: "string"
      logic: "Use Okta profile.organization if present and string, else fall back to email domain"
      description: "Organization name"

    - source: "profile.department"
      target: "user.org.ou_name"
      type: "string"
      logic: "Map Okta profile.department to organizational unit name if present and string"
      description: "Organizational unit (department)"

    # USER GROUPS & MFA
    - source: "list_user_groups API"
      target: "user.groups"
      type: "array[object]"
      logic: "Fetch groups via Okta API; each group maps to Group(uid, name, desc, privileges)"
      description: "Group memberships with group roles/privileges"

    - source: "list_factors API"
      target: "user.has_mfa"
      type: "boolean"
      logic: "true if user has at least one MFA factor enrolled, false otherwise"
      description: "Whether user has MFA configured"

    # USER TYPE
    - source: "list_assigned_roles_for_user API"
      target: "user.type_id"
      type: "integer"
      logic: "2 (UserTypeId.ADMIN) if user has an active role with 'admin' in the type, else null"
      description: "OCSF user type ID"

    - source: "list_assigned_roles_for_user API"
      target: "user.type"
      type: "string"
      logic: "'Admin' (UserTypeStr.ADMIN) if user has an active admin role, else null"
      description: "OCSF user type"

    # TEMPORAL INFORMATION
    - source: "created"
      target: "time"
      type: "float"
      logic: "Convert ISO 8601 to Unix epoch (float) for OCSF event timestamp"
      description: "OCSF event timestamp (user creation time as epoch)"

    # OCSF EVENT CLASSIFICATION
    - source: "static: 2"
      target: "activity_id"
      type: "integer"
      logic: "Always 2 for 'Collect' activity"
      description: "OCSF activity ID for inventory collection"

    - source: "static: Collect"
      target: "activity_name"
      type: "string"
      logic: "Always 'Collect'"
      description: "OCSF activity name"

    - source: "static: Discovery"
      target: "category_name"
      type: "string"
      logic: "Always 'Discovery'"
      description: "OCSF category name"

    - source: "static: 5"
      target: "category_uid"
      type: "integer"
      logic: "Always 5 for Discovery category"
      description: "OCSF category UID"

    - source: "static: User Inventory Info"
      target: "class_name"
      type: "string"
      logic: "Always 'User Inventory Info'"
      description: "OCSF class name"

    - source: "static: 5003"
      target: "class_uid"
      type: "integer"
      logic: "Always 5003 for User Inventory Info"
      description: "OCSF class UID"

    - source: "computed: 500300 + activity_id"
      target: "type_uid"
      type: "integer"
      logic: "Base 500300 + activity_id (2 = 500302)"
      description: "OCSF type UID"

    - source: "computed: class_name + ': ' + activity_name"
      target: "type_name"
      type: "string"
      logic: "Concatenate 'User Inventory Info: Collect'"
      description: "OCSF type name"

    - source: "static: Informational"
      target: "severity"
      type: "string"
      logic: "Always 'Informational' for inventory events"
      description: "Event severity level"

    - source: "static: 1"
      target: "severity_id"
      type: "integer"
      logic: "Always 1 for Informational severity"
      description: "OCSF severity ID"

    # METADATA
    - source: "static: Okta"
      target: "metadata.product.name"
      type: "string"
      logic: "Always 'Okta'"
      description: "Source product name"

    - source: "static: 1.6.0"
      target: "metadata.version"
      type: "string"
      logic: "Fixed OCSF schema version"
      description: "OCSF schema version"

    # OCSF ENRICHMENT - USER ACCESS INFORMATION
    - source: "status"
      target: "enrichments[0].data.is_enabled"
      type: "boolean"
      logic: "true if status == UserStatus.ACTIVE, false if other status, null if status is None"
      description: "Whether user account is enabled (maps to UserDataObject.is_enabled)"

    - source: "lastLogin"
      target: "enrichments[0].data.last_logon"
      type: "string"
      logic: "Raw ISO 8601 string from Okta lastLogin field (Okta SDK: user.last_login); null if never logged in"
      description: "Last logon timestamp as ISO string (maps to UserDataObject.last_logon)"

    - source: "passwordChanged"
      target: "enrichments[0].data.last_time_password_change"
      type: "float"
      logic: "Convert ISO 8601 passwordChanged (Okta SDK: user.password_changed) to Unix epoch float; null if never changed"
      description: "Password last changed as Unix epoch float (maps to UserDataObject.last_time_password_change)"

    - source: "static: access_control"
      target: "enrichments[0].name"
      type: "string"
      logic: "Always 'access_control' for Okta enrichment type"
      description: "Enrichment object name"

    - source: "static: okta"
      target: "enrichments[0].value"
      type: "string"
      logic: "Always 'okta' for Okta user access enrichment"
      description: "Enrichment object value"

